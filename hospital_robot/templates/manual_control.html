<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Manual Control</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header><h1>Manual Control</h1><nav><a href="/">Back to Dashboard</a></nav></header>

  <div class="manual-area">
    <div class="controls">
      <button id="forward">⬆ Forward</button><br>
      <button id="left">⬅</button>
      <button id="stop">⏹</button>
      <button id="right">➡</button><br>
      <button id="backward">⬇ Backward</button>
    </div>
    <div id="status">Status: Ready</div>
  </div>

<script>
async function sendAction(action) {
  try {
    await fetch('/api/move', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action})});
    document.getElementById('status').innerText = 'Sent: '+action;
  } catch (e) {
    document.getElementById('status').innerText = 'Network error';
  }
}

// click-and-hold behavior
function bindHold(id, action) {
  const el = document.getElementById(id);
  let timer = null;
  const start = () => { sendAction(action); timer = setInterval(()=>sendAction(action), 150); }
  const stop = () => { if (timer) clearInterval(timer); timer = null; sendAction('stop'); }
  el.addEventListener('mousedown', start); el.addEventListener('mouseup', stop);
  el.addEventListener('mouseleave', stop); el.addEventListener('touchstart', start); el.addEventListener('touchend', stop);
}

bindHold('forward','forward'); bindHold('backward','backward'); bindHold('left','left'); bindHold('right','right');
document.getElementById('stop').addEventListener('click', ()=>sendAction('stop'));
</script>
</body>
</html>
